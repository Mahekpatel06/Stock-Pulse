services:
  gins-db:
    image: mysql:8.0
    environment:
      # Use your actual credentials here
      MYSQL_ROOT_PASSWORD: rootpswrd
      MYSQL_DATABASE: product
    ports:
      # External (Windows): 3307, Internal (Docker): 3306
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpswrd"]
      interval: 10s
      timeout: 5s
      retries: 10

  gins-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      # CRITICAL FIX: Use 3306 here, NOT 3307. 
      # Also updated DB name to 'product'
      - DB_URL=jdbc:mysql://gins-db:3306/product?allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=root
      - DB_PASSWORD=rootpswrd
    depends_on:
      gins-db:
        condition: service_healthy
